name: Flutter CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies (Package)
        run: flutter pub get

      - name: Check Formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze Code (Package)
        run: flutter analyze

      - name: Run Tests (Package)
        run: flutter test

      - name: Install Dependencies (Example)
        run: |
          cd example
          flutter pub get

      - name: Analyze Code (Example)
        run: |
          cd example
          flutter analyze

      - name: Run Tests (Example)
        run: |
          cd example
          flutter test
